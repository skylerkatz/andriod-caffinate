name: Build & Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]*//g')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "${{ steps.version.outputs.name }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk caffeinate-${{ steps.version.outputs.name }}.apk
          gh release create "${{ steps.version.outputs.name }}" \
            caffeinate-${{ steps.version.outputs.name }}.apk \
            --title "Caffeinate v${{ steps.version.outputs.name }}" \
            --notes "Caffeinate v${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }})" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
